# Configuration for pre-commit (https://pre-commit.com/), a tool to run
# formatters, linters, and other productivity tools before a commit.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.3.0
    hooks:
      - id: check-ast
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: requirements-txt-fixer
      - id: check-yaml
        exclude: ^tests/capi2_cores/misc/syntax_error\.core$
        types: [file]
        files: ^tests/capi2_cores/.+\.core$
      - id: end-of-file-fixer
        # Test golden references
        exclude: ^tests/(.+\.(info|patch)|test_provider/.+\.v)
      - id: trailing-whitespace
        # Test golden references
        exclude: ^tests/(.+\.(info|patch)|test_provider/.+\.v)
  - repo: https://github.com/asottile/pyupgrade
    rev: v2.7.4
    hooks:
      - id: pyupgrade
        # for now don't force to change from %-operator to {}
        args: [--keep-percent-format, --py3-plus, --py36-plus]
  - repo: https://github.com/PyCQA/isort
    rev: "5.11.5"
    hooks:
      - id: isort
        args: ["--profile", "black", "--filter-files"]
  - repo: https://github.com/psf/black
    rev: 22.3.0
    hooks:
      - id: black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      # Run the linter.
      - id: ruff-check
      # The formatter could be run in the future
      #- id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        # Typed runtime deps mypy needs to resolve imports for the
        # strict-checked modules. Keep in sync with `pyproject.toml`'s
        # `[project].dependencies` for any package that ships type info.
        additional_dependencies:
          - pydantic>=2.13.3
          - typing_extensions
          - pyparsing>=2.3.1
          - types-PyYAML
        args: [--config-file=pyproject.toml]
        # Don't let pre-commit pass file paths as arguments — they would
        # override `files = [...]` in pyproject.toml and pull every Python
        # file into the check regardless of the strict whitelist.
        pass_filenames: false
  - repo: local
    hooks:
      # ty doesn't have an upstream pre-commit hook repo yet (Astral ships
      # one for ruff and uv but not ty). Until it does, use a local hook
      # with `language: python` so pre-commit installs the pinned ty into
      # an isolated venv on every contributor's machine.
      - id: ty-check
        name: ty check
        entry: ty check
        language: python
        # ty itself + the runtime deps needed to resolve imports for the
        # checked modules. Mirror the mypy hook's additional_dependencies
        # for the same project deps.
        additional_dependencies:
          - ty>=0.0.34
          - pydantic>=2.13.3
          - typing_extensions
          - pyparsing>=2.3.1
        types_or: [python, pyi]
        pass_filenames: false
